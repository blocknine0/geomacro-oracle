name: Auto-create Agent Arena markets

# Runs every 30 minutes, and can also be triggered manually from the
# Actions tab for testing.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  create-markets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install ethers @supabase/supabase-js

      - name: Run market creation script
        env:
          OWNER_PRIVATE_KEY: ${{ secrets.OWNER_PRIVATE_KEY }}
          APP_SUPABASE_URL: ${{ secrets.APP_SUPABASE_URL }}
          APP_SUPABASE_ANON_KEY: ${{ secrets.APP_SUPABASE_ANON_KEY }}
          ARC_RPC_URL: ${{ secrets.ARC_RPC_URL }}
        run: node scripts/create-markets.js
